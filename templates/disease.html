{% extends "base.html" %}
{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Disease Detection</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f4f6f9;
            font-family: Arial, sans-serif;
        }
        .container {
            margin-top: 50px;
            max-width: 700px;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .preview {
            max-height: 300px;
            object-fit: contain;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card p-4">
        <h2 class="text-center mb-4">🌱 Plant Disease Detection</h2>

        <!-- Upload Form -->
        <form method="POST" enctype="multipart/form-data" class="text-center">
            <input class="form-control mb-3" type="file" name="file" accept="image/*" required onchange="previewImage(event)">
            <button type="submit" class="btn btn-success">Detect Disease</button>
        </form>

        <!-- Image Preview -->
        <div class="mt-4 text-center">
            <img id="preview" class="preview img-fluid d-none rounded" alt="Uploaded Image Preview">
        </div>

        <!-- Result -->
        {% if prediction %}
        <div class="alert alert-info mt-4 text-center">
            <h4>✅ Prediction: <strong>{{ prediction }}</strong></h4>
        </div>
        {% endif %}
    </div>
</div>

<script>
    function previewImage(event) {
        let reader = new FileReader();
        reader.onload = function(){
            let output = document.getElementById('preview');
            output.src = reader.result;
            output.classList.remove("d-none");
        };
        reader.readAsDataURL(event.target.files[0]);
    }
</script>
</body>
</html>


{% if result %}
<hr>
<h4>Detected: <span class="badge bg-danger">{{ result }}</span></h4>
<p>Confidence: {{ prob }}%</p>
{% endif %}
{% endblock %}
